services:
  orchestr8ai:
    build: .
    image: orchestr8ai:latest
    restart: unless-stopped
    expose:
      - "${DASHBOARD_PORT:-3000}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.orchestr8ai-dashboard.rule=Host(`${DASHBOARD_DOMAIN:-dashboard.example.com}`)"
      - "traefik.http.routers.orchestr8ai-dashboard.entrypoints=https"
      - "traefik.http.routers.orchestr8ai-dashboard.tls=true"
      - "traefik.http.routers.orchestr8ai-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.orchestr8ai-dashboard.loadbalancer.server.port=${DASHBOARD_PORT:-3000}"
    environment:
      # Internal URLs — wired to the bundled services, no user configuration needed
      DATABASE_URL: postgresql://orchestr8ai:${POSTGRES_PASSWORD}@postgres:5432/orchestr8ai_prod
      NATS_URL: nats://nats:4222
      # User-supplied values (from .env)
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      GUILD_ID: ${GUILD_ID}
      ORCHESTRATOR_CHANNEL_ID: ${ORCHESTRATOR_CHANNEL_ID}
      PROJECTS_CATEGORY_ID: ${PROJECTS_CATEGORY_ID:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_MODEL: ${AI_MODEL}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_INPUT_PRICE_PER_MTOK: ${AI_INPUT_PRICE_PER_MTOK:-}
      AI_OUTPUT_PRICE_PER_MTOK: ${AI_OUTPUT_PRICE_PER_MTOK:-}
      DASHBOARD_USER: ${DASHBOARD_USER:-}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      DASHBOARD_PORT: ${DASHBOARD_PORT:-3000}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:-}
    networks:
      - default   # internal: bot ↔ postgres ↔ nats
      - coolify   # external: Coolify's Traefik proxy can reach port 3000
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orchestr8ai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orchestr8ai_prod
    volumes:
      - orchestr8ai-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestr8ai -d orchestr8ai_prod"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    # Config passed as CLI flags — no bind mounts needed, works on any platform
    command: ["-js", "--store_dir", "/data/jetstream", "-m", "8222"]
    volumes:
      - orchestr8ai-nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  orchestr8ai-pg-data:
  orchestr8ai-nats-data:

networks:
  default: {}
  # Coolify's Traefik proxy network — exists automatically on any Coolify host.
  # If you are NOT using Coolify, remove the 'coolify' network here and the
  # 'networks' block on the orchestr8ai service above.
  coolify:
    external: true
