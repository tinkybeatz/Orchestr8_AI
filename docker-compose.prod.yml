services:
  orchestr8ai:
    build: .
    image: orchestr8ai:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NATS_URL: ${NATS_URL}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      GUILD_ID: ${GUILD_ID}
      ORCHESTRATOR_CHANNEL_ID: ${ORCHESTRATOR_CHANNEL_ID}
      PROJECTS_CATEGORY_ID: ${PROJECTS_CATEGORY_ID}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AI_PROVIDER: ${AI_PROVIDER}
      AI_MODEL: ${AI_MODEL}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orchestr8ai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orchestr8ai_prod
    volumes:
      - orchestr8ai-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestr8ai -d orchestr8ai_prod"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats-server.conf"]
    volumes:
      - orchestr8ai-nats-data:/data
      - ./docker/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  orchestr8ai-pg-data:
  orchestr8ai-nats-data:
